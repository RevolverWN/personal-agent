# pre-commit 配置，对齐 CI (ci.yml)
# 使用方法: pre-commit install (只需在 main worktree 执行一次)

ci:
  autoupdate_schedule: monthly

repos:
  # 基础文件检查（通用）
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=2048']

  # Ruff: lint + format（对齐 CI: ruff check + ruff format --check）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
